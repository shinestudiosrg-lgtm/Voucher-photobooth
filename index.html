<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Shine Studio Elite Voucher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #004aad, #ffd700);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  color: white;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

h1 {
  font-size: 20px;
}

.desc {
  font-size: 12px;
  color: #eee;
}

.link-btn {
  display: block;
  margin: 5px;
  padding: 8px;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  color: white;
  text-decoration: none;
  font-size: 13px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  width: 95%;
  padding: 12px;
  background: #ffd700;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  margin-top: 10px;
}

/* VOUCHER DESIGN */
.voucher {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: linear-gradient(135deg, #111, #333);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.kode {
  font-size: 18px;
  font-weight: bold;
  color: #ffd700;
}

#qrcode {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎟️ Shine Studio Elite</h1>

  <p class="desc">
    Claim voucher GRATIS photobooth!<br>
    Follow IG & TikTok → Isi data → Claim
  </p>

  <a class="link-btn" href="https://www.instagram.com/shine.photostudio_id" target="_blank">📸 Instagram</a>
  <a class="link-btn" href="https://www.tiktok.com/@shine.photostudio_id" target="_blank">🎵 TikTok</a>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="wa" placeholder="No WA">
  <input type="text" id="ig" placeholder="Username IG">
  <input type="date" id="tanggal">

  <label style="font-size:12px;">
    <input type="checkbox" id="cek"> Sudah follow
  </label>

  <button onclick="claim()">CLAIM</button>

  <div id="voucherBox" class="voucher" style="display:none;">
    <div>🎟️ VOUCHER RESMI</div>
    <div id="kode" class="kode"></div>
    <div id="tanggalText"></div>
    <div id="qrcode"></div>
  </div>

  <button onclick="downloadVoucher()" style="display:none;" id="downloadBtn">📥 Download Voucher</button>

</div>

<script>
let kodeGlobal = "";

function claim() {

  if (!cek.checked) {
    alert("Follow dulu!");
    return;
  }

  if (!nama.value || !wa.value || !ig.value || !tanggal.value) {
    alert("Isi semua data!");
    return;
  }

  let kode = "SHINE-" + Math.floor(1000 + Math.random() * 9000);
  kodeGlobal = kode;

  document.getElementById("voucherBox").style.display = "block";
  document.getElementById("downloadBtn").style.display = "block";

  document.getElementById("kode").innerText = kode;
  document.getElementById("tanggalText").innerText = "Tanggal: " + tanggal.value;

  QRCode.toCanvas(document.getElementById('qrcode'), kode);

  let pesan = `Halo Shine Studio, saya claim voucher:\nNama: ${nama.value}\nWA: ${wa.value}\nIG: ${ig.value}\nTanggal: ${tanggal.value}\nKode: ${kode}`;

  setTimeout(() => {
    window.open(`https://wa.me/6283894036552?text=${encodeURIComponent(pesan)}`, "_blank");
  }, 1200);
}

function downloadVoucher() {
  html2canvas(document.getElementById("voucherBox")).then(canvas => {
    let link = document.createElement("a");
    link.download = "voucher-shine.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
