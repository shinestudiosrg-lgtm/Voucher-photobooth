<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Shine Studio Voucher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #003c8f, #005bea, #ffd700, #ffcc00);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-radius: 25px;
  width: 340px;
  color: white;
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

.logo-img {
  display: block;
  margin: auto;
  width: 80px;
}

.title {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  text-shadow: 0 0 10px #ffd700;
}

.desc {
  font-size: 12px;
  text-align: center;
}

.terms {
  font-size: 11px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.link-btn {
  display: block;
  margin: 5px;
  padding: 10px;
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  color: white;
  text-decoration: none;
  text-align: center;
}

input {
  width: 95%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #ffd700;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  margin-top: 10px;
}

.voucher {
  margin-top: 15px;
  padding: 15px;
  border-radius: 15px;
  background: linear-gradient(135deg, #111, #333);
  text-align: center;
}

.kode {
  font-size: 18px;
  color: #ffd700;
  font-weight: bold;
}

#qrcode {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo-img">

<div class="title">SHINE STUDIO</div>

<p class="desc">Claim voucher GRATIS photobooth</p>

<div class="terms">
<b>Syarat & Ketentuan:</b><br>
• Wajib follow IG & TikTok<br>
• IG tidak boleh private<br>
• Jika private = tidak valid<br>
• Voucher hanya 1x<br>
• Tidak bisa dibatalkan
</div>

<a class="link-btn" href="https://www.instagram.com/shine.photostudio_id" target="_blank">📸 Instagram</a>
<a class="link-btn" href="https://www.tiktok.com/@shine.photostudio_id" target="_blank">🎵 TikTok</a>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="wa" placeholder="No WhatsApp">
<input type="text" id="ig" placeholder="Username Instagram">

<input type="date" id="tanggal">
<input type="time" id="jam">

<label style="font-size:12px;">
<input type="checkbox" id="cek"> Saya sudah memenuhi syarat
</label>

<button onclick="claim()">CLAIM</button>

<div id="voucherBox" class="voucher" style="display:none;">
<div>🎟️ VOUCHER RESMI</div>
<div id="kode" class="kode"></div>
<div id="tanggalText"></div>
<div id="jamText"></div>
<div id="qrcode"></div>
</div>

<button id="downloadBtn" style="display:none;" onclick="downloadVoucher()">📥 Download</button>
<button id="waBtn" style="display:none;" onclick="kirimWA()">📲 Kirim WA</button>

</div>

<script>
let dataGlobal = {};

function claim() {

if (!cek.checked) {
alert("Harap penuhi syarat!");
return;
}

if (!nama.value || !wa.value || !ig.value || !tanggal.value || !jam.value) {
alert("Lengkapi data!");
return;
}

let kode = "SHINE-" + Math.floor(1000 + Math.random() * 9000);

dataGlobal = {
nama: nama.value,
wa: wa.value,
ig: ig.value,
tanggal: tanggal.value,
jam: jam.value,
kode: kode
};

voucherBox.style.display = "block";
downloadBtn.style.display = "block";
waBtn.style.display = "block";

document.getElementById("kode").innerText = kode;
document.getElementById("tanggalText").innerText = "Tanggal: " + tanggal.value;
document.getElementById("jamText").innerText = "Jam: " + jam.value;

QRCode.toCanvas(document.getElementById('qrcode'), kode);
}

function kirimWA() {

let pesan =
`✨ *SHINE STUDIO VOUCHER* ✨

Halo admin, saya sudah claim voucher photobooth dengan detail berikut:

👤 *Nama:* ${dataGlobal.nama}
📱 *WhatsApp:* ${dataGlobal.wa}
📸 *Instagram:* @${dataGlobal.ig}

📅 *Tanggal Booking:* ${dataGlobal.tanggal}
⏰ *Jam Booking:* ${dataGlobal.jam}

🎟️ *Kode Voucher:* ${dataGlobal.kode}

Mohon konfirmasi booking saya ya 🙏
Terima kasih`;

window.open(`https://wa.me/6283894036552?text=${encodeURIComponent(pesan)}`);
}

function downloadVoucher() {
html2canvas(document.getElementById("voucherBox")).then(canvas => {
let link = document.createElement("a");
link.download = "voucher.png";
link.href = canvas.toDataURL();
link.click();
});
}
</script>

</body>
</html>
